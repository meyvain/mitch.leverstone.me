<title>{{ SITENAME }}</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="{{ DESCRIPTION }}" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ SITEURL }}/theme/css/mods.css" />

<meta property="og:title" content="{{ SITENAME }}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="{{ SITEURL }}" />
<meta property="og:image:secure_url" itemprop="image" content="{{ SITEURL }}/images/avatar.jpg" />
<meta property="og:description" content="{{ DESCRIPTION }}" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:image" content="{{ SITEURL }}/images/avatar.jpg" />
